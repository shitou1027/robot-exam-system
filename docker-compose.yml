version: '3.8'

services:
  mongodb:
    image: mongo:6-jammy
    container_name: robot-exam-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: robot_exam

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: robot-exam-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://admin:admin123@mongodb:27017/robot_exam?authSource=admin
      - JWT_SECRET=your-super-secret-key
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - mongodb
    command: npm start

volumes:
  mongo_data:
